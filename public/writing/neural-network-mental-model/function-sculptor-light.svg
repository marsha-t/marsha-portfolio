<svg width="980" height="470" viewBox="0 0 980 470" xmlns="http://www.w3.org/2000/svg">

<style>
:root {
  --panel: #ffffff;
  --stroke: #374151;
  --text: #111827;
  --axis: #d1d5db;

  --curve-1: #7c3aed;
  --curve-2: #2563eb;
  --curve-3: #059669;

  --curve-final: #111827;
  --arrow: #6b7280;
}

.panel {
  fill: var(--panel);
  stroke: var(--stroke);
  stroke-width: 1.3;
}

.axis {
  stroke: var(--axis);
  stroke-width: 1;
}

.label {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  font-weight: 600;
  fill: var(--text);
  text-anchor: middle;
}

.curve-1 {
  stroke: var(--curve-1);
  stroke-width: 2.5;
  fill: none;
}

.curve-2 {
  stroke: var(--curve-2);
  stroke-width: 2.5;
  fill: none;
}

.curve-3 {
  stroke: var(--curve-3);
  stroke-width: 2.5;
  fill: none;
}

.curve-final {
  stroke: var(--curve-final);
  stroke-width: 3;
  fill: none;
}

.arrow {
  stroke: var(--arrow);
  stroke-width: 1.8;
  fill: none;
  marker-end: url(#arrowhead);
}
</style>

<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="10"
          refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
  </marker>
</defs>

<!-- Titles -->

<text x="180" y="40" class="label">
  Small nonlinear transformations
</text>

<text x="560" y="40" class="label">
  Combined across neurons
</text>

<text x="870" y="40" class="label">
  A sculpted function
</text>

<!-- Left column -->

<!-- Graph 1 -->
<rect x="60" y="70" width="220" height="100" rx="12" class="panel"/>

<line x1="80" y1="120" x2="250" y2="120" class="axis"/>
<line x1="165" y1="85" x2="165" y2="155" class="axis"/>

<path d="M85 145
         C110 145, 120 145, 135 132
         C150 119, 160 95, 185 92
         C210 90, 225 98, 250 98"
      class="curve-1"/>

<!-- Graph 2 -->
<rect x="60" y="200" width="220" height="100" rx="12" class="panel"/>

<line x1="80" y1="250" x2="250" y2="250" class="axis"/>
<line x1="165" y1="215" x2="165" y2="285" class="axis"/>

<path d="M85 225
         C110 225, 125 232, 140 248
         C155 264, 170 280, 195 278
         C220 276, 235 260, 250 230"
      class="curve-2"/>

<!-- Graph 3 -->
<rect x="60" y="330" width="220" height="100" rx="12" class="panel"/>

<line x1="80" y1="380" x2="250" y2="380" class="axis"/>
<line x1="165" y1="345" x2="165" y2="415" class="axis"/>

<path d="M85 395
         C110 395, 130 388, 150 365
         C170 342, 195 345, 250 360"
      class="curve-3"/>

<!-- Arrows -->

<path d="M300 120 C360 120, 390 160, 430 220" class="arrow"/>
<path d="M300 250 C360 250, 390 250, 430 250" class="arrow"/>
<path d="M300 380 C360 380, 390 340, 430 280" class="arrow"/>

<!-- Middle panel -->

<rect x="450" y="150" width="220" height="180" rx="14" class="panel"/>

<line x1="475" y1="240" x2="645" y2="240" class="axis"/>
<line x1="560" y1="175" x2="560" y2="305" class="axis"/>

<path d="M480 270
         C500 290, 520 275, 540 240
         C560 205, 585 200, 610 220
         C625 232, 635 250, 645 275"
      class="curve-1" opacity="0.55"/>

<path d="M480 210
         C510 210, 530 225, 545 248
         C560 271, 580 285, 605 278
         C625 272, 635 255, 645 225"
      class="curve-2" opacity="0.55"/>

<path d="M480 275
         C505 275, 530 255, 550 225
         C570 195, 600 198, 645 215"
      class="curve-3" opacity="0.55"/>

<path d="M480 270
         C505 305, 530 290, 550 235
         C570 180, 600 180, 620 230
         C635 265, 640 280, 645 205"
      class="curve-final"/>

<!-- Arrow to final -->

<path d="M690 240 C735 240, 760 240, 785 240" class="arrow"/>

<!-- Final panel -->

<rect x="800" y="170" width="150" height="140" rx="14" class="panel"/>

<line x1="820" y1="240" x2="930" y2="240" class="axis"/>
<line x1="875" y1="190" x2="875" y2="290" class="axis"/>

<path d="M825 265
         C840 300, 860 290, 875 235
         C890 180, 915 180, 925 220"
      class="curve-final"/>

</svg>