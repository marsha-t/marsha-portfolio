<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800">

<style>
@keyframes shimmer {
  0% {
    transform: translateX(-8px);
    opacity: 0.35;
  }
  50% {
    transform: translateX(8px);
    opacity: 0.75;
  }
  100% {
    transform: translateX(-8px);
    opacity: 0.35;
  }
}

.reflection line {
  animation: shimmer 6s ease-in-out infinite;
}

/* cascading delays */
.reflection line:nth-child(1) { animation-delay: 0s; }
.reflection line:nth-child(2) { animation-delay: 0.6s; }
.reflection line:nth-child(3) { animation-delay: 1.2s; }
.reflection line:nth-child(4) { animation-delay: 1.8s; }
.reflection line:nth-child(5) { animation-delay: 2.4s; }

</style>

<g class="reflection" stroke="#fff7c7" stroke-width="2">

  <line x1="780" y1="440" x2="820" y2="440"/>
  <line x1="770" y1="470" x2="830" y2="470"/>
  <line x1="760" y1="510" x2="840" y2="510"/>
  <line x1="740" y1="560" x2="860" y2="560"/>
  <line x1="720" y1="620" x2="880" y2="620"/>

</g>

<defs>

<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#cfd8f6"/>
<stop offset="40%" stop-color="#f3d6df"/>
<stop offset="75%" stop-color="#f7e3d7"/>
<stop offset="100%" stop-color="#f9eadf"/>
</linearGradient>

<linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#c6d5ef"/>
<stop offset="100%" stop-color="#a9bdd9"/>
</linearGradient>

</defs>

<!-- Sky -->
<rect width="1600" height="800" fill="url(#sky)" />

<!-- Sea -->
<rect x="0" y="420" width="1600" height="380" fill="url(#sea)" />

<!-- Horizon -->
<rect x="0" y="420" width="1600" height="2" fill="#e6c7c7" opacity="0.6"/>

<!-- Sun -->
<circle cx="800" cy="420" r="140" fill="#fff7c7"/>

<!-- Mask bottom half -->
<rect x="0" y="420" width="1600" height="380" fill="url(#sea)"/>

<!-- Animated reflection -->
<g stroke="#fff7c7" stroke-width="2" class="reflection">

<line x1="780" y1="440" x2="820" y2="440"/>
<line x1="770" y1="470" x2="830" y2="470"/>
<line x1="760" y1="510" x2="840" y2="510"/>
<line x1="740" y1="560" x2="860" y2="560"/>
<line x1="720" y1="620" x2="880" y2="620"/>

</g>

</svg>