<svg width="1100" height="300" viewBox="0 0 1100 300" xmlns="http://www.w3.org/2000/svg">

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
<path d="M0 0 L10 5 L0 10" fill="#e5e7eb"/>
</marker>

<style>
/* === TOKENS === */
:root {
  --bg: #0f1115;
  --box-fill: #16181d;
  --box-stroke: #e5e7eb;
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
  --arrow: #e5e7eb;
}

/* === COMPONENTS === */
.box {
  fill: var(--box-fill);
  stroke: var(--box-stroke);
  stroke-width: 1.8;
  rx: 12;
}

.label {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  font-size: 15px;
  fill: var(--text-main);
  text-anchor: middle;
  dominant-baseline: middle;
}

.sub {
  font-size: 14px;
  fill: var(--text-muted);
}

.arrow {
  stroke: var(--arrow);
  stroke-width: 2;
  fill: none;
  marker-end: url(#arrow);
}

.icon {
  stroke: var(--text-muted);
  stroke-width: 1.8;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>
</defs>


<!-- ICONS -->

<!-- markdown document -->
<g class="icon">
<rect x="120" y="40" width="40" height="48" rx="6"/>
<line x1="130" y1="60" x2="150" y2="60"/>
<line x1="130" y1="72" x2="150" y2="72"/>
</g>

<!-- frontmatter -->
<g class="icon">
<polyline points="390,60 375,70 390,80"/>
<polyline points="430,60 445,70 430,80"/>
</g>

<!-- pipeline -->
<g class="icon">
<circle cx="690" cy="70" r="6"/>
<circle cx="710" cy="60" r="6"/>
<circle cx="730" cy="70" r="6"/>
<line x1="690" y1="70" x2="710" y2="60"/>
<line x1="710" y1="60" x2="730" y2="70"/>
</g>

<!-- browser -->
<g class="icon">
<rect x="960" y="50" width="40" height="30" rx="4"/>
<line x1="960" y1="58" x2="1000" y2="58"/>
<circle cx="966" cy="54" r="2"/>
<circle cx="972" cy="54" r="2"/>
</g>


<!-- BOXES -->

<rect class="box" x="40" y="130" width="200" height="80"/>
<text class="label" x="140" y="158">Markdown Files</text>
<text class="label sub" x="140" y="182">Projects / Writing</text>

<line class="arrow" x1="240" y1="170" x2="320" y2="170"/>

<rect class="box" x="320" y="130" width="200" height="80"/>
<text class="label" x="420" y="158">Frontmatter</text>
<text class="label sub" x="420" y="182">gray-matter</text>

<line class="arrow" x1="520" y1="170" x2="600" y2="170"/>

<rect class="box" x="600" y="130" width="200" height="80"/>
<text class="label" x="700" y="158">Markdown Processing</text>
<text class="label sub" x="700" y="182">remark → rehype</text>

<line class="arrow" x1="800" y1="170" x2="880" y2="170"/>

<rect class="box" x="880" y="130" width="200" height="80"/>
<text class="label" x="980" y="158">Next.js</text>
<text class="label sub" x="980" y="182">Static Pages</text>

</svg>