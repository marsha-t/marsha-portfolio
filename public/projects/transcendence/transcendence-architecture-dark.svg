<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">

<style>
  /* === TOKENS === */
  :root {
    --bg-layer: #16181d;
    --box-fill: #1e2128;
    --box-stroke: #e5e7eb;
    --text-main: #e5e7eb;
    --text-muted: #9ca3af;
    --arrow: #e5e7eb;
    --accent: #60a5fa;
    --frontend: #1f3d2b;
  }

  /* === COMPONENTS === */
  .box {
    fill: var(--box-fill);
    stroke: var(--box-stroke);
    stroke-width: 1.5;
    rx: 10;
  }

  .layer {
    fill: var(--bg-layer);
    stroke: #374151;
    stroke-width: 1;
    rx: 12;
  }

  .text {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 13px;
    fill: var(--text-main);
    text-anchor: middle;
    dominant-baseline: middle;
  }

  .title {
    font-weight: 600;
    font-size: 14px;
  }

  .muted {
    fill: var(--text-muted);
  }

  .arrow {
    stroke: var(--arrow);
    stroke-width: 1.5;
    marker-end: url(#arrow);
    fill: none;
  }

  .ws {
    stroke: var(--accent);
    stroke-width: 2;
    stroke-dasharray: 5 4;
    marker-end: url(#arrow-blue);
  }
</style>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#e5e7eb"/>
  </marker>

  <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#60a5fa"/>
  </marker>
</defs>

<!-- Client -->
<circle cx="500" cy="60" r="35" fill="#1f2937" stroke="#e5e7eb"/>
<text x="500" y="55" class="text title">User</text>
<text x="500" y="70" class="text muted">Browser</text>

<!-- Nginx -->
<rect x="400" y="120" width="200" height="55" class="box"/>
<text x="500" y="143" class="text title">Nginx</text>
<text x="500" y="160" class="text muted">HTTPS / WSS</text>

<!-- Frontend -->
<rect x="400" y="200" width="200" height="65" fill="var(--frontend)" stroke="#e5e7eb" rx="10"/>
<text x="500" y="220" class="text title">Frontend</text>
<text x="500" y="237" class="text muted">SPA (TypeScript + Tailwind)</text>
<text x="500" y="253" class="text muted">Served via Nginx</text>

<!-- Backend Layer -->
<rect x="50" y="300" width="900" height="220" class="layer"/>
<text x="500" y="325" class="text title">Backend Services</text>

<!-- Services -->

<!-- Auth -->
<rect x="70" y="350" width="140" height="70" class="box"/>
<text x="140" y="372" class="text title">Auth</text>
<text x="140" y="390" class="text muted">Login, JWT</text>
<text x="140" y="405" class="text muted">Account Mgmt</text>

<!-- Profile -->
<rect x="230" y="350" width="140" height="70" class="box"/>
<text x="300" y="372" class="text title">Profile</text>
<text x="300" y="390" class="text muted">User Profiles</text>
<text x="300" y="405" class="text muted">Avatars</text>

<!-- Friends -->
<rect x="390" y="350" width="140" height="70" class="box"/>
<text x="460" y="372" class="text title">Friends</text>
<text x="460" y="390" class="text muted">Friend Lists</text>
<text x="460" y="405" class="text muted">Social</text>

<!-- Game -->
<rect x="550" y="350" width="180" height="70" class="box"/>
<text x="640" y="372" class="text title">Game-Tournament</text>
<text x="640" y="390" class="text muted">Gameplay Engine</text>
<text x="640" y="405" class="text muted">Tournaments + AI</text>

<!-- Dashboard -->
<rect x="750" y="350" width="160" height="70" class="box"/>
<text x="830" y="372" class="text title">Dashboard</text>
<text x="830" y="390" class="text muted">Analytics + Stats</text>
<text x="830" y="405" class="text muted">Aggregation</text>

<!-- Databases -->
<rect x="250" y="550" width="200" height="50" class="box"/>
<text x="350" y="580" class="text">user-social.db</text>

<rect x="600" y="550" width="200" height="50" class="box"/>
<text x="700" y="580" class="text">game-tournament.db</text>

<!-- Arrows -->
<line x1="500" y1="95" x2="500" y2="120" class="arrow"/>
<line x1="500" y1="175" x2="500" y2="200" class="arrow"/>

<!-- Frontend to services -->
<line x1="430" y1="265" x2="140" y2="350" class="arrow"/>
<line x1="450" y1="265" x2="300" y2="350" class="arrow"/>
<line x1="500" y1="265" x2="460" y2="350" class="arrow"/>
<line x1="540" y1="265" x2="640" y2="345" class="arrow"/>
<line x1="570" y1="265" x2="830" y2="350" class="arrow"/>

<!-- DB connections -->
<line x1="140" y1="420" x2="350" y2="550" class="arrow"/>
<line x1="300" y1="420" x2="350" y2="550" class="arrow"/>
<line x1="460" y1="420" x2="350" y2="550" class="arrow"/>

<line x1="640" y1="425" x2="700" y2="550" class="arrow"/>
<line x1="830" y1="420" x2="700" y2="550" class="arrow"/>

</svg>