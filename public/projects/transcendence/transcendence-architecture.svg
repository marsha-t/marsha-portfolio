<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">

<style>
  .box { fill: #ffffff; stroke: #333; stroke-width: 1.5; rx: 10; }
  .layer { fill: #f5f5f5; stroke: #aaa; stroke-width: 1; rx: 12; }
  .text { font-family: Inter, sans-serif; font-size: 12px; fill: #222; }
  .title { font-weight: 600; font-size: 13px; }
  .arrow { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); }
  .ws { stroke: #2563eb; stroke-width: 2; stroke-dasharray: 5 4; marker-end: url(#arrow); }
</style>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
  </marker>
</defs>

<!-- Client -->
<circle cx="500" cy="60" r="35" fill="#e6f0ff" stroke="#333"/>
<text x="500" y="60" text-anchor="middle" class="text title">User</text>
<text x="500" y="78" text-anchor="middle" class="text">Browser</text>

<!-- Nginx -->
<rect x="400" y="120" width="200" height="55" class="box"/>
<text x="500" y="145" text-anchor="middle" class="text title">Nginx</text>
<text x="500" y="162" text-anchor="middle" class="text">HTTPS / WSS</text>

<!-- Frontend -->
<rect x="400" y="200" width="200" height="65" fill="#d9f2e6" stroke="#333" rx="10"/>
<text x="500" y="225" text-anchor="middle" class="text title">Frontend</text>
<text x="500" y="242" text-anchor="middle" class="text">SPA (TypeScript + Tailwind)</text>
<text x="500" y="258" text-anchor="middle" class="text">Served via Nginx</text>

<!-- Backend Layer -->
<rect x="50" y="300" width="900" height="220" class="layer"/>
<text x="500" y="325" text-anchor="middle" class="text title">Backend Services</text>

<!-- Services Row -->

<!-- Auth -->
<rect x="70" y="350" width="140" height="70" class="box"/>
<text x="140" y="372" text-anchor="middle" class="text title">Auth</text>
<text x="140" y="390" text-anchor="middle" class="text">Login, JWT</text>
<text x="140" y="405" text-anchor="middle" class="text">Account Mgmt</text>

<!-- Profile -->
<rect x="230" y="350" width="140" height="70" class="box"/>
<text x="300" y="372" text-anchor="middle" class="text title">Profile</text>
<text x="300" y="390" text-anchor="middle" class="text">User Profiles</text>
<text x="300" y="405" text-anchor="middle" class="text">Avatars</text>

<!-- Friends -->
<rect x="390" y="350" width="140" height="70" class="box"/>
<text x="460" y="372" text-anchor="middle" class="text title">Friends</text>
<text x="460" y="390" text-anchor="middle" class="text">Friend Lists</text>
<text x="460" y="405" text-anchor="middle" class="text">Social</text>

<!-- Game (slightly bigger for emphasis) -->
<rect x="550" y="345" width="180" height="80" class="box"/>
<text x="640" y="370" text-anchor="middle" class="text title">Game-Tournament</text>
<text x="640" y="390" text-anchor="middle" class="text">Gameplay Engine</text>
<text x="640" y="405" text-anchor="middle" class="text">Tournaments + AI</text>

<!-- Dashboard -->
<rect x="750" y="350" width="160" height="70" class="box"/>
<text x="830" y="372" text-anchor="middle" class="text title">Dashboard</text>
<text x="830" y="390" text-anchor="middle" class="text">Analytics + Stats</text>
<text x="830" y="405" text-anchor="middle" class="text">Aggregation</text>

<!-- Databases -->
<rect x="250" y="550" width="200" height="50" class="box"/>
<text x="350" y="580" text-anchor="middle" class="text">user-social.db</text>

<rect x="600" y="550" width="200" height="50" class="box"/>
<text x="700" y="580" text-anchor="middle" class="text">game-tournament.db</text>

<!-- Arrows -->
<line x1="500" y1="95" x2="500" y2="120" class="arrow"/>
<line x1="500" y1="175" x2="500" y2="200" class="arrow"/>

<!-- Frontend to services -->
<line x1="430" y1="265" x2="140" y2="350" class="arrow"/>
<line x1="450" y1="265" x2="300" y2="350" class="arrow"/>
<line x1="500" y1="265" x2="460" y2="350" class="arrow"/>
<line x1="540" y1="265" x2="640" y2="345" class="arrow"/>
<line x1="570" y1="265" x2="830" y2="350" class="arrow"/>

<!-- DB connections -->
<line x1="140" y1="420" x2="350" y2="550" class="arrow"/>
<line x1="300" y1="420" x2="350" y2="550" class="arrow"/>
<line x1="460" y1="420" x2="350" y2="550" class="arrow"/>

<line x1="640" y1="425" x2="700" y2="550" class="arrow"/>
<line x1="830" y1="420" x2="700" y2="550" class="arrow"/>

</svg>