<svg width="960" height="260" viewBox="0 40 960 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: Inter, system-ui, sans-serif;
    }

    .label {
      font-size: 14px;
      font-weight: 600;
      fill: rgb(230 230 230);
    }

    .sub {
      font-size: 12px;
      fill: rgb(163 163 163);
    }

    .ground {
      stroke: rgb(82 82 82);
      stroke-width: 10;
      stroke-linecap: round;
    }

    .object {
      fill: rgb(12 74 110);
      stroke: rgb(56 189 248);
      stroke-width: 2;
    }

    .blocker {
      fill: rgb(67 20 7);
      stroke: rgb(251 146 60);
      stroke-width: 2;
    }

    .primary-ray {
      stroke: rgb(56 189 248);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-dasharray: 6 6;
    }

    .shadow-ray {
      stroke: rgb(251 146 60);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-dasharray: 6 6;
    }

    .blocked-ray {
      stroke: rgb(248 113 113);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-dasharray: 6 6;
    }
  </style>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="rgb(56 189 248)" />
    </marker>

    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="rgb(251 146 60)" />
    </marker>

    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="rgb(248 113 113)" />
    </marker>
  </defs>

  <!-- Ground -->
  <path
    d="M120 230 C300 220 540 222 850 205"
    class="ground"
  />

  <!-- Main sphere -->
  <circle
    cx="400"
    cy="175"
    r="58"
    class="object"
  />

  <!-- Occluder -->
  <circle
    cx="610"
    cy="125"
    r="42"
    class="blocker"
  />

  <!-- Camera -->
  <circle cx="150" cy="150" r="6" fill="rgb(230 230 230)" />

  <!-- Primary ray -->
  <line
    x1="156"
    y1="151"
    x2="345"
    y2="164"
    class="primary-ray"
    marker-end="url(#arrow-blue)"
  />

  <!-- Hit point -->
  <circle cx="345" cy="164" r="5" fill="rgb(230 230 230)" />

  <!-- Light A -->
  <circle cx="260" cy="85" r="8" fill="rgb(250 204 21)" />

  <line
    x1="345"
    y1="164"
    x2="260"
    y2="85"
    class="shadow-ray"
    marker-end="url(#arrow-orange)"
  />

  <!-- Light B -->
  <circle cx="800" cy="90" r="8" fill="rgb(250 204 21)" />

  <line
    x1="345"
    y1="164"
    x2="800"
    y2="90"
    class="blocked-ray"
    marker-end="url(#arrow-red)"
  />

  <!-- Block marker -->
  <g transform="translate(595 130)">
    <line
      x1="-8"
      y1="-8"
      x2="8"
      y2="8"
      stroke="rgb(248 113 113)"
      stroke-width="2.5"
      stroke-linecap="round"
    />

    <line
      x1="8"
      y1="-8"
      x2="-8"
      y2="8"
      stroke="rgb(248 113 113)"
      stroke-width="2.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Labels -->
  <text x="150" y="128" text-anchor="middle" class="label">
    camera
  </text>

  <text x="345" y="145" text-anchor="middle" class="label">
    hit point
  </text>

  <text x="260" y="62" text-anchor="middle" class="label">
    light A
  </text>

  <text x="800" y="67" text-anchor="middle" class="label">
    light B
  </text>

  <text x="610" y="188" text-anchor="middle" class="label">
    occluder
  </text>

  <!-- Ray labels -->
  <text x="240" y="135" class="sub">
    primary ray
  </text>

  <text x="275" y="118" class="sub">
    shadow ray
  </text>

  <text x="525" y="100" class="sub">
    blocked shadow ray
  </text>
</svg>