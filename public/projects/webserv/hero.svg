<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">

<style>
.box {
  fill: #f8fafc;
  stroke: #cbd5e1;
  stroke-width: 1.5;
  rx: 8;
}
.text {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  font-size: 14px;
  fill: #0f172a;
  text-anchor: middle;
  dominant-baseline: middle;
}
.small {
  font-size: 11px;
  fill: #64748b;
}
.arrow {
  stroke: #94a3b8;
  stroke-width: 2;
  marker-end: url(#arrowhead);
}
</style>

<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
  </marker>
</defs>

<!-- Client -->
<rect x="20" y="80" width="120" height="60" class="box"/>
<text x="80" y="105" class="text">Client</text>
<text x="80" y="125" class="text small">(Browser)</text>

<!-- Socket -->
<rect x="200" y="80" width="140" height="60" class="box"/>
<text x="270" y="100" class="text">TCP Socket</text>
<text x="270" y="125" class="text small">accept()</text>

<!-- Event Loop -->
<rect x="400" y="80" width="140" height="60" class="box"/>
<text x="470" y="100" class="text">Event Loop</text>
<text x="470" y="125" class="text small">select()</text>

<!-- Router -->
<rect x="600" y="80" width="120" height="60" class="box"/>
<text x="660" y="105" class="text">Router</text>
<text x="660" y="125" class="text small">config rules</text>

<!-- Handler -->
<rect x="780" y="80" width="160" height="60" class="box"/>
<text x="860" y="100" class="text">Handler</text>
<text x="860" y="125" class="text small">Static / CGI</text>

<!-- Arrows -->
<line x1="140" y1="110" x2="200" y2="110" class="arrow"/>
<line x1="340" y1="110" x2="400" y2="110" class="arrow"/>
<line x1="540" y1="110" x2="600" y2="110" class="arrow"/>
<line x1="720" y1="110" x2="780" y2="110" class="arrow"/>

<!-- Labels -->
<text x="170" y="70" class="small text">HTTP Request</text>
<text x="720" y="70" class="small text">Route to handler</text>

</svg>