<svg width="1050" height="260" viewBox="0 0 1050 260" xmlns="http://www.w3.org/2000/svg">

<style>
/* === TOKENS === */
:root {
  --box-fill: #111113;      
  --box-stroke: #ffffff;    
  --text-main: #ccc;     
  --text-muted: #cccccc;    
  --arrow: #cccccc;       
}

/* === COMPONENTS === */
.box {
  fill: var(--box-fill);
  stroke: var(--box-stroke);
  stroke-width: 1.5;
  rx: 10;
}

.text {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  font-size: 14px;
  font-weight: bold;
  fill: var(--text-main);
  text-anchor: middle;
  dominant-baseline: middle;
}

.arrow {
  stroke: var(--arrow);
  stroke-width: 2;
  marker-end: url(#arrowhead);
  fill: none;
}

</style>

<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="var(--arrow)" />
  </marker>
</defs>

<!-- === NODES === -->

<!-- Client -->
<rect x="40" y="100" width="80" height="50" class="box"/> 
<text x="80" y="125" class="text">Client</text>

<!-- Listening Socket -->
<rect x="160" y="95" width="140" height="50" class="box"/>
<text x="230" y="120" class="text">Listening Socket</text>

<!-- Event Loop -->
<rect x="340" y="95" width="120" height="50" class="box"/>
<text x="400" y="120" class="text">Event Loop</text>

<!-- Request Parser -->
<rect x="500" y="95" width="120" height="50" class="box"/>
<text x="560" y="120" class="text">Request Parser</text>

<!-- Router -->
<rect x="660" y="95" width="80" height="50" class="box"/>
<text x="700" y="120" class="text">Router</text>

<!-- Handler -->
<rect x="780" y="95" width="80" height="50" class="box"/>
<text x="820" y="120" class="text">Handler</text>

<!-- Response -->
<rect x="900" y="95" width="100" height="50" class="box"/>
<text x="950" y="120" class="text">Response</text>

<!-- === ARROWS === -->

<!-- Forward flow -->
<line x1="120" y1="120" x2="160" y2="120" class="arrow"/>
<line x1="300" y1="120" x2="340" y2="120" class="arrow"/>
<line x1="460" y1="120" x2="500" y2="120" class="arrow"/>
<line x1="620" y1="120" x2="660" y2="120" class="arrow"/>
<line x1="740" y1="120" x2="780" y2="120" class="arrow"/>
<line x1="860" y1="120" x2="900" y2="120" class="arrow"/>

<!-- Loop back (response) -->
<path d="M 950 150 C 900 220, 200 220, 95 150" class="arrow"/>

<!-- === LABELS === -->
<text x="135" y="80" class="text">HTTP Request</text>

</svg>